<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Song Request — Song List</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <h1>Song Request</h1>
    <p>Request a song to add it to the queue</p>
    <nav class="header-nav">
      <a href="/" class="active">Songs</a>
      <a href="/queue">Queue</a>
    </nav>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search songs or artists…" autocomplete="off">
    </div>
    <div class="sort-bar">
      <button class="sort-btn active" data-sort="title">Sort A→Z by Title</button>
      <button class="sort-btn" data-sort="artist">Sort A→Z by Artist</button>
    </div>
  </div>

  <!-- Song count -->
  <div class="song-count" id="songCount"></div>

  <!-- Song list -->
  <div class="song-list" id="songList"></div>
</div>

<!-- Request modal (bottom sheet) -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Request This Song</h2>
    <p class="modal-song" id="modalSong"></p>
    <label for="nameInput">Your first name</label>
    <input type="text" id="nameInput" placeholder="e.g. Sarah" maxlength="40" autocomplete="given-name">
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">Cancel</button>
      <button class="btn-submit" id="btnSubmit">Send Request</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="/js/app.js"></script>
</body>
</html>
